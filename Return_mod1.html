<!DOCTYPE html>
<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">
    <title>Pagamento </title>
</head>

<body>
    <div class="container mt-4">
        <h2>Pagamento con conto - RETURN 🌐</h2>

        <form action="https://acardste.vaservices.eu:1443/wallet/resume" method="GET" target="_blank">
            <div class="mb-3 col-4">
                <label for="inputMd" class="form-label">MD</label>
                <input type="text" id="inputMd" name="MD" class="form-control">
            </div>
            <div class="mb-3 col-4">
                <label for="inputOutcome" class="form-label">OUTCOME</label>
                <select id="inputOutcome" name="outcome" class="form-control">
                    <option value="OK">OK</option>
                    <option value="DIFFERITO">DIFFERITO</option>
                    <option value="KO">KO</option>
                </select>
            </div>

            <button class="btn btn-primary" type="submit">Return</button>
        </form>
        <div class="alert alert-danger mt-5 text-center" role="alert">
            ⚠ TEST ONLY ⚠
        </div>
    </div>
</body>

</html>
